name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix build --print-build-logs

      # Build the NixOS module's generated config with default options —
      # catches config generation bugs (like the null-TOML failure) that
      # `nix build` never exercises.
      - name: build NixOS module config (defaults)
        run: |
          nix build --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              sys = flake.inputs.nixpkgs.lib.nixosSystem {
                system = "x86_64-linux";
                modules = [
                  flake.nixosModules.temple-server
                  { services.temple-server.enable = true; nixpkgs.config.allowUnfree = true; }
                ];
              };
            in sys.config.environment.etc."temple/config.toml".source
          ' -o /tmp/temple-cfg-test
          cat /tmp/temple-cfg-test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop --command cargo fmt --check
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - run: nix develop --command cargo test --workspace
