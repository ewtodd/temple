name: CI Audit Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AUDIT_LOG: audit.log
  RUST_BACKTRACE: 1

permissions:
  contents: read
  actions: read

jobs:
  audit-pipeline:
    name: Full Audit Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize audit log
        run: |
          chmod +x scripts/audit-log.sh
          ./scripts/audit-log INFO pipeline "CI run started — SHA: ${{ github.sha }}"
          ./scripts/audit-log INFO pipeline "Trigger: ${{ github.event_name }} by ${{ github.actor }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Step 1: Code formatting check ──
      - name: Audit Step — rustfmt
        run: |
          set -o pipefail
          cargo fmt --check 2>&1 | tee /tmp/fmt.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            ./scripts/audit-log PASS fmt "rustfmt check passed"
          else
            ./scripts/audit-log FAIL fmt "rustfmt check failed — code not formatted"
            cat /tmp/fmt.log
            exit 1
          fi

      # ── Step 2: Clippy linting ──
      - name: Audit Step — clippy
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee /tmp/clippy.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            ./scripts/audit-log PASS lint "clippy passed — no warnings"
          else
            ./scripts/audit-log FAIL lint "clippy found warnings/errors"
            cat /tmp/clippy.log
            exit 1
          fi

      # ── Step 3: Dependency vulnerability scan ──
      - name: Audit Step — cargo-audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          set +e
          cargo audit 2>&1 | tee /tmp/audit-deps.log
          audit_rc=$?
          set -e
          if [ $audit_rc -eq 0 ]; then
            ./scripts/audit-log PASS dep-scan "cargo-audit: no known vulnerabilities"
          else
            ./scripts/audit-log WARN dep-scan "cargo-audit found advisories (non-blocking)"
            echo "Dependency advisories logged to audit artifact."
          fi

      # ── Step 4: Build ──
      - name: Audit Step — build
        run: |
          set -o pipefail
          cargo build --workspace --release 2>&1 | tee /tmp/build.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            ./scripts/audit-log PASS build "Release build succeeded"
          else
            ./scripts/audit-log FAIL build "Release build failed"
            exit 1
          fi

      # ── Step 5: Tests with coverage ──
      - name: Audit Step — tests
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee /tmp/test.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            ./scripts/audit-log PASS test "All tests passed"
            # Count tests
            test_count=$(grep -c 'test result:' /tmp/test.log 2>/dev/null || echo "unknown")
            ./scripts/audit-log INFO test "Test summary captured"
          else
            ./scripts/audit-log FAIL test "Tests failed"
            exit 1
          fi

      # ── Step 6: Tarpaulin coverage (optional, best-effort) ──
      - name: Audit Step — coverage
        continue-on-error: true
        run: |
          cargo install cargo-tarpaulin --locked 2>/dev/null || true
          set +e
          cargo tarpaulin --workspace --out xml --output-dir ./coverage 2>&1 | tee /tmp/coverage.log
          if [ -f ./coverage/cobertura.xml ]; then
            ./scripts/audit-log PASS coverage "Coverage report generated (cobertura.xml)"
          else
            ./scripts/audit-log WARN coverage "Coverage report not generated (tarpaulin may not be available)"
          fi

      # ── Final: Archive artifacts ──
      - name: Archive audit artifacts
        if: always()
        run: |
          ./scripts/audit-log INFO pipeline "CI run completed — archiving artifacts"
          mkdir -p ./ci-artifacts
          cp audit.log ./ci-artifacts/audit.log
          [ -f /tmp/clippy.log ] && cp /tmp/clippy.log ./ci-artifacts/
          [ -f /tmp/test.log ] && cp /tmp/test.log ./ci-artifacts/
          [ -f /tmp/build.log ] && cp /tmp/build.log ./ci-artifacts/
          [ -f /tmp/audit-deps.log ] && cp /tmp/audit-deps.log ./ci-artifacts/
          [ -f /tmp/fmt.log ] && cp /tmp/fmt.log ./ci-artifacts/
          [ -d ./coverage ] && cp -r ./coverage/* ./ci-artifacts/ 2>/dev/null || true
          echo "=== Final Audit Log ==="
          cat audit.log

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-audit-artifacts
          path: ci-artifacts/
          retention-days: 30
